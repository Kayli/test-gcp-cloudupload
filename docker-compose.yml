version: "3.9"

# Full local dev stack — one command starts everything:
#
#   docker compose up
#
# Services
# --------
#   ui      http://localhost:5173  (Vite dev server with HMR)
#   api     http://localhost:3000  (FastAPI, hot-reload via uvicorn --reload)
#   minio   http://localhost:9000  (S3 API)   http://localhost:9001  (Console)
#
# The Vite proxy forwards /health /config /uploads /files → api:3000.
# MinIO presigned URLs are rewritten to localhost:9000 so the browser can
# upload/download directly without going through the backend.
#
# Credentials (MinIO): minioadmin / minioadmin

services:
  # ── Vite dev server (React UI with HMR) ─────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: Dockerfile.ui
    ports:
      - "5173:5173"
    volumes:
      - .:/app              # bind-mount source for HMR
      - ui_node_modules:/app/node_modules  # keep container node_modules isolated
    environment:
      # Proxy targets api by its compose service name
      API_URL: http://api:3000
    depends_on:
      api:
        condition: service_healthy


  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "3000:3000"
    volumes:
      - .:/app                # bind-mount source for hot-reload
      - api_data:/app/data    # persist SQLite metadata DB
    environment:
      ALLOW_DEV_AUTH: "1"
      # MinIO reachable by service name inside Docker
      MINIO_ENDPOINT:    http://minio:9000
      # Presigned URLs are rewritten to localhost so the browser can reach MinIO
      MINIO_PUBLIC_URL:  http://localhost:9000
      MINIO_BUCKET:      uploads
      MINIO_ACCESS_KEY:  minioadmin
      MINIO_SECRET_KEY:  minioadmin
    depends_on:
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 6


  # ── Object storage (MinIO — S3-compatible) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: docstore-minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  minio_data:
  api_data:
  ui_node_modules:
