# Full local dev stack — one command starts everything:
#
#   docker compose up
#
# Services
# --------
#   ui      http://localhost:5173  (Vite dev server with HMR)
#   api     http://localhost:3000  (FastAPI, hot-reload via uvicorn --reload)
#   minio   http://localhost:9000  (S3 API)   http://localhost:9001  (Console)
#
# Object storage routing
# ----------------------
# Port 9000 (MinIO) is only reachable inside the compose network; the host
# browser cannot reach it directly when running under DinD.  Instead, all
# MinIO traffic is proxied through the Vite dev server (port 5173, which VS
# Code does forward to the host):
#
#   browser → localhost:5173/objstore/... → Vite proxy → minio:9000/objstore/...
#
# MINIO_PUBLIC_URL=http://localhost:5173 tells the API to generate presigned
# URLs using the Vite host.  The bucket is named "objstore" to avoid colliding
# with the /uploads API route that Vite already proxies to FastAPI.
#
# Credentials (MinIO): minioadmin / minioadmin

services:
  # ── Vite dev server (React UI with HMR) ─────────────────────────────────────
  ui:
    build:
      context: .
      dockerfile: frontend/Dockerfile.ui
    ports:
      - "5173:5173"
    volumes:
      - .:/app              # bind-mount source for HMR
      - ui_node_modules:/app/node_modules  # keep container node_modules isolated
      - ui_public:/app/public              # pre-built static assets (from image layer)
    environment:
      API_URL:   http://api:3000
      MINIO_URL: http://minio:9000   # Vite proxy target for /objstore/* inside compose
    depends_on:
      api:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      # node is always available in node:20-slim; no need to install curl/wget.
      test: ["CMD", "node", "-e",
             "require('http').get('http://localhost:5173/',r=>process.exit(r.statusCode<500?0:1)).on('error',()=>process.exit(1))"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s

  # ── FastAPI backend ──────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: backend/Dockerfile.api
    ports:
      - "3000:3000"
    volumes:
      - .:/app                # bind-mount source for hot-reload
      - api_data:/app/data    # persist SQLite metadata DB
      - ui_public:/app/public # pre-built static assets shared from ui image
    env_file:
      - path: .devcontainer/.env   # provides GOOGLE_OAUTH_CLIENT_ID and GCS_BUCKET etc.
        required: false            # file is absent in CI; all vars have safe defaults
    environment:
      # ── compose-internal fixed overrides ─────────────────────────────────
      # These always use compose-network service hostnames regardless of .env.
      MINIO_ENDPOINT: http://minio:9000
      DATABASE_URL: postgresql://docstore:docstore@postgres:5432/docstore
      # ── shell pass-throughs (bare-key syntax) ─────────────────────────────
      # If the variable IS set in the shell (CI step env, server.py subprocess)
      # compose uses that value.  If the variable is NOT set in the shell,
      # compose leaves env_file (.devcontainer/.env) authoritative — no override.
      ALLOW_DEV_AUTH:
      MINIO_PUBLIC_URL:
      MINIO_ACCESS_KEY:
      MINIO_SECRET_KEY:
      MINIO_BUCKET:
    depends_on:
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 5s
      start_interval: 1s


  # ── Object storage (MinIO — S3-compatible) ──────────────────────────────────
  minio:
    image: minio/minio:latest
    container_name: objstore-minio
    ports:
      - "9000:9000"   # S3-compatible API
      - "9001:9001"   # MinIO Console UI
    environment:
      MINIO_ROOT_USER:     minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 2s
      start_interval: 2s

  # ── PostgreSQL metadata store ────────────────────────────────────────────────
  # Exposed on host port 5432 so that `pytest` running in the devcontainer can
  # connect directly (set DATABASE_URL=postgresql://docstore:docstore@localhost:5432/docstore).
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB:       docstore
      POSTGRES_USER:     docstore
      POSTGRES_PASSWORD: docstore
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U docstore -d docstore"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s

volumes:
  minio_data:
  api_data:
  ui_node_modules:
  ui_public:
  pg_data:
