name: CI

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Install Python + Playwright on the host runner so pytest and the browser
      # run natively (faster than a container, and avoids DinD complexity).
      # The frontend is served by the `ui` compose service — no host-side build needed.
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install "./backend[test]"

      - name: Get installed Playwright version
        id: playwright-version
        run: |
          echo "PLAYWRIGHT_VERSION=$(python -c "import playwright; print(playwright.__version__)")" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # Spin up the full compose stack — identical to local `docker compose up`.
      # --wait blocks until every service with a healthcheck passes.
      # Vars that would normally come from .devcontainer/.env are injected here.
      # MINIO_PUBLIC_URL=http://localhost:5173 so presigned URLs are routed
      # through the Vite proxy (port 5173 is mapped to the host runner);
      # ensure_server() overrides it to localhost:9000 for the API-level upload
      # tests, and browser_minio_url restores it to 5173 for the UI test.
      - name: Start services
        env:
          ALLOW_DEV_AUTH: '1'
          MINIO_PUBLIC_URL: http://localhost:5173
          MINIO_BUCKET: objstore
          MINIO_ACCESS_KEY: minioadmin
          MINIO_SECRET_KEY: minioadmin
        run: |
          docker compose up -d --wait

      - name: Test
        env:
          ALLOW_DEV_AUTH: '1'
          APP_URL: 'http://localhost:3000'
          UI_URL: 'http://localhost:5173'
          # Headless Chromium on the runner — no host Chrome to connect to via CDP.
          USE_HOST_BROWSER: '0'
          # Point tests at the Postgres exposed by the compose stack.
          DATABASE_URL: 'postgresql://docstore:docstore@localhost:5432/docstore'
        run: pytest -v

      - name: Stop services
        if: always()
        run: docker compose down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: ignore
          path: test-results
