name: CI

"on":
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Build the frontend first — the API container bind-mounts the workspace
      # and serves public/ as static files, so the built assets need to exist.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install JS dependencies
        run: npm ci

      - name: Build client
        run: npm run build

      # Install Python + Playwright on the host runner so pytest and the browser
      # run natively (faster than a container, and avoids DinD complexity).
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install .

      - name: Get installed Playwright version
        id: playwright-version
        run: |
          echo "PLAYWRIGHT_VERSION=$(python -c "import playwright; print(playwright.__version__)")" >> $GITHUB_ENV

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: playwright-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ env.PLAYWRIGHT_VERSION }}

      - name: Install Playwright browsers + system deps
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: playwright install --with-deps chromium

      - name: Install Playwright system deps (browsers cached)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: playwright install-deps chromium

      # Spin up the full compose stack (minio + api) using the CI override which:
      #   • clears env_file (.devcontainer/.env doesn't exist in CI)
      #   • sets MINIO_PUBLIC_URL=http://localhost:9000 so presigned URLs point to
      #     the MinIO port exposed on the host (not the Vite proxy used in dev)
      # --wait blocks until both services pass their healthchecks.
      - name: Start services
        run: |
          docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait api

      - name: Test
        env:
          ALLOW_DEV_AUTH: '1'
          APP_URL: 'http://localhost:3000'
        run: pytest test/ -v

      - name: Stop services
        if: always()
        run: docker compose -f docker-compose.yml -f docker-compose.ci.yml down -v

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          if-no-files-found: ignore
          path: test-results
