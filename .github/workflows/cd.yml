name: CD — Deploy to Cloud Run

# Runs only on pushes to main AFTER CI has already passed (branch protection
# should require the CI workflow to succeed before merging).
on:
  push:
    branches: [main]

# Cancel any in-flight deployment for the same branch so only the latest
# commit on main is ever live.
concurrency:
  group: cd-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    name: Build, push & deploy
    runs-on: ubuntu-latest

    # id-token: write is required for Workload Identity Federation (WIF).
    # No long-lived service-account keys are stored in GitHub secrets.
    permissions:
      contents: read
      id-token: write

    env:
      # Must match `terraform output cloud_run_service_name`
      GCP_SERVICE:  docstore-api
      GCP_REGION:   us-central1

    steps:
      - uses: actions/checkout@v4

      # ── GCP authentication via Workload Identity Federation ─────────────────
      # Required GitHub repository secrets (Settings → Secrets → Actions):
      #   GCP_WIF_PROVIDER  — from `terraform output workload_identity_provider`
      #   GCP_SA_EMAIL      — from `terraform output deployer_service_account`
      # Required GitHub repository variables (Settings → Variables → Actions):
      #   GCP_PROJECT_ID    — your GCP project ID
      #   GCP_IMAGE_REPO    — from `terraform output image_repo`
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.GCP_REGION }}-docker.pkg.dev --quiet

      # ── Build and push the production image ──────────────────────────────────
      # backend/Dockerfile.prod is a multi-stage build:
      #   Stage 1 (node:20)   — builds the React/Vite frontend
      #   Stage 2 (python:3.11-slim) — installs FastAPI deps + baked-in assets
      - name: Build and push container image
        env:
          IMAGE: ${{ vars.GCP_IMAGE_REPO }}/api:${{ github.sha }}
          IMAGE_LATEST: ${{ vars.GCP_IMAGE_REPO }}/api:latest
        run: |
          docker build \
            --file backend/Dockerfile.prod \
            --tag "$IMAGE" \
            --tag "$IMAGE_LATEST" \
            --cache-from "$IMAGE_LATEST" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .

          docker push "$IMAGE"
          docker push "$IMAGE_LATEST"

      # ── Deploy to Cloud Run ───────────────────────────────────────────────────
      # `gcloud run deploy` updates only the container image.  All other service
      # configuration (env vars, secrets, scaling, Cloud SQL connection) is
      # managed by Terraform and intentionally left untouched here.
      - name: Deploy to Cloud Run
        env:
          IMAGE: ${{ vars.GCP_IMAGE_REPO }}/api:${{ github.sha }}
        run: |
          gcloud run deploy ${{ env.GCP_SERVICE }} \
            --image "$IMAGE" \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --quiet

      # ── Smoke-test the live service ───────────────────────────────────────────
      - name: Smoke test — /health
        run: |
          SERVICE_URL=$(gcloud run services describe ${{ env.GCP_SERVICE }} \
            --region "${{ env.GCP_REGION }}" \
            --project "${{ vars.GCP_PROJECT_ID }}" \
            --format "value(status.url)")

          echo "Service URL: $SERVICE_URL"

          # Retry up to 10 times (Cloud Run may need a moment to route traffic)
          for i in $(seq 1 10); do
            STATUS=$(curl -s -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")
            if [ "$STATUS" = "200" ]; then
              echo "Health check passed (attempt $i)"
              exit 0
            fi
            echo "Attempt $i: HTTP $STATUS — retrying in 5s…"
            sleep 5
          done

          echo "Health check failed after 10 attempts"
          exit 1
