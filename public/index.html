<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>DocStore Prototype UI</title>
    <style>
      body { font-family: system-ui, sans-serif; padding: 2rem; }
      label { display:block; margin-top: 0.5rem }
    </style>
  </head>
  <body>
    <h1>DocStore Prototype</h1>
    <div id="auth">
      <p id="signed-out">Not signed in.</p>
      <button id="fake-login">Dev: Sign in as tester@example.com</button>
      <div id="google-signin" style="margin-top:1rem"></div>
    </div>

    <section id="uploader" style="margin-top:1.5rem;display:none">
      <button id="upload-btn">Upload file</button>
      <input id="file-input" type="file" style="display:none" />
      <pre id="upload-result" style="margin-top:0.75rem"></pre>
    </section>

    <script>
      // Basic dev auth flow: set a header for dev use.
      // var (not let) so these are accessible as window.dummyUser / window.idToken from tests
      var dummyUser = null;
      var idToken = null;
      window._appConfig = { googleClientId: null, allowDevAuth: false };

      function updateAuthDisplay(){
        const signedEl = document.getElementById('signed-out');
        const fakeBtn = document.getElementById('fake-login');
        const uploader = document.getElementById('uploader');

        const signedIn = !!idToken || !!dummyUser;
        // hide Google sign-in area when signed in
        const googleSigninEl = document.getElementById('google-signin');
        if (googleSigninEl) googleSigninEl.style.display = signedIn ? 'none' : '';

        if (idToken) {
          // try to decode email from token
          try{
            const payload = JSON.parse(atob(idToken.split('.')[1].replace(/-/g,'+').replace(/_/g,'/')));
            const email = payload.email || 'unknown';
            signedEl.innerText = 'Signed in as ' + email;
          }catch(e){ signedEl.innerText = 'Signed in'; }
          fakeBtn.style.display = 'none';
          if (googleSigninEl) googleSigninEl.style.display = 'none';
        } else if (dummyUser) {
          signedEl.innerText = 'Signed in as ' + dummyUser;
          fakeBtn.style.display = 'none';
          if (googleSigninEl) googleSigninEl.style.display = 'none';
        } else {
          signedEl.innerText = 'Not signed in.';
          // show fake-login only when server explicitly allows dev auth
          fakeBtn.style.display = window._appConfig.allowDevAuth ? 'inline-block' : 'none';
        }

        // When signed in show only the uploader (per requirement)
        if (signedIn) {
          // hide all top-level body children except the uploader
          document.querySelectorAll('body > *').forEach(el => {
            if (el.id !== 'uploader') el.style.display = 'none';
          });
          uploader.style.display = 'block';
        } else {
          // restore normal visibility for non-signed-in state
          document.querySelectorAll('body > *').forEach(el => { el.style.display = ''; });
          uploader.style.display = 'none';
        }
      }

      async function initConfig(){
        try{
          const r = await fetch('/config');
          const cfg = await r.json();
          window._appConfig = cfg || window._appConfig;
          if (cfg.googleClientId) {
            // Dynamically load Google Identity Services and render button
            const s = document.createElement('script');
            s.src = 'https://accounts.google.com/gsi/client';
            s.onload = () => initGSI(cfg.googleClientId);
            document.head.appendChild(s);
          }
        }catch(e){
          console.warn('Could not fetch config', e);
        } finally {
          window._configLoaded = true;
          updateAuthDisplay();
        }
      }

      function initGSI(clientId){
        if (!window.google || !clientId) return;
        window.google.accounts.id.initialize({
          client_id: clientId,
          callback: handleCredentialResponse
        });
        window.google.accounts.id.renderButton(
          document.getElementById('google-signin'),
          { theme: 'outline', size: 'large' }
        );
        window.google.accounts.id.prompt();
      }

      function handleCredentialResponse(response){
        // response.credential is the ID token (JWT)
        idToken = response.credential;
        updateAuthDisplay();
      }

      document.getElementById('fake-login').addEventListener('click', () => {
        dummyUser = 'tester@example.com';
        updateAuthDisplay();
      });

      async function postJSON(url, body){
        const headers = { 'Content-Type':'application/json' };
        if (idToken) headers['Authorization'] = 'Bearer ' + idToken;
        else if (dummyUser) headers['x-dummy-user'] = dummyUser;
        const r = await fetch(url, { method: 'POST', headers, body: JSON.stringify(body) });
        return r.json();
      }

      // Upload button triggers file picker
      const uploadBtn = document.getElementById('upload-btn');
      const fileInput = document.getElementById('file-input');
      uploadBtn.addEventListener('click', () => fileInput.click());

      fileInput.addEventListener('change', async (ev) => {
        const file = ev.target.files && ev.target.files[0];
        const out = document.getElementById('upload-result');
        if (!file) return;
        out.innerText = 'Requesting upload URL...';
        try {
          // For the prototype use a default tenantId (could be derived from user)
          const tenantId = 'team-a';
          const res = await postJSON('/uploads', { tenantId, filename: file.name });
          out.innerText = 'Upload URL response:\n' + JSON.stringify(res, null, 2);
          if (res.uploadUrl) {
            out.innerText += '\n\nUploading file...';
            try {
              const uploadResp = await fetch(res.uploadUrl, { method: 'PUT', body: file, headers: { 'Content-Type': file.type || 'application/octet-stream' } });
              out.innerText += '\nUpload finished: ' + uploadResp.status + ' ' + uploadResp.statusText;
            } catch (e) {
              out.innerText += '\nUpload failed: ' + e.message;
            }
          }
        } catch (e) {
          out.innerText = 'Error requesting upload URL: ' + e.message;
        }
      });

      // download UI intentionally removed from the client-side source

      initConfig();
    </script>
  </body>
</html>
