# CI compose override — apply on top of docker-compose.yml:
#
#   docker compose -f docker-compose.yml -f docker-compose.ci.yml up -d --wait api
#
# What this changes from the base file:
#
#   api.MINIO_PUBLIC_URL → http://localhost:9000 (MinIO's exposed host port, reachable
#                          by the test runner on the GH Actions host — Vite isn't running)

services:
  api:
    environment:
      MINIO_PUBLIC_URL: "http://localhost:9000"   # presigned URLs must be reachable from the host runner
